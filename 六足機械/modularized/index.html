<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六足機器人模擬器 - 姿態控制與效能統計</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container control-panel">
        <header>
            <h2>進階機械人姿態模擬器</h2>
            <div class="header-actions">
                <button id="toggleGroundlineBtn" class="btn-secondary active admin-only" style="white-space: nowrap;">支撐區間指示</button>
                <button id="toggleFrictionBtn" class="btn-secondary active admin-only" style="white-space: nowrap;">物理摩擦指示</button>
                <button id="resetBtn" class="btn-secondary">恢復預設</button>
            </div>
        </header>

        <main class="bento-grid">
            <!-- Hero Canvas Area -->
            <section class="bento-item hero-canvas">
                <canvas id="simCanvas" width="1120" height="630"></canvas>
            </section>

            <!-- Side Panel Container (Chat + Log Toggle) -->
            <div class="side-panel-group">
                <div class="panel-header-toggle">
                    <div class="segmented-control">
                        <button id="showChatBtn" class="tab-btn active">🤖 小六 AI</button>
                        <button id="showLogBtn" class="tab-btn">🕵️ 診斷日誌</button>
                    </div>
                </div>

                <section class="bento-item ai-chat-panel active-panel" id="chatPanel">
                    <div class="section-header">
                        <span class="section-title">🤖 小六 AI 診斷助手</span>
                    </div>
                    <div id="chatHistory" class="chat-history">
                        <div class="message ai-msg">
                            <div class="msg-avatar">🤖</div>
                            <div class="msg-content">嘿！我是小六，我會在這裡幫你觀察機器人的走路狀況喔！試著調整看看滑桿吧！✨</div>
                        </div>
                    </div>
                    <div class="ai-status">
                        <span class="status-dot"></span>
                        <span class="status-text">觀察中...</span>
                    </div>
                    <div class="chat-input-area">
                        <input type="text" id="userInput" placeholder="問問小六關於機器人的事..." autocomplete="off">
                        <button id="sendBtn" class="btn-primary">送出</button>
                    </div>
                </section>

                <!-- Debug Console -->
                <section class="bento-item debug-console-panel" id="logPanel">
                    <div class="debug-header">
                        <span>🕵️ 診斷傳輸日誌</span>
                        <div class="debug-nav">
                            <button id="prevLog" class="btn-mini">◀</button>
                            <span id="logCounter">0 / 0</span>
                            <button id="nextLog" class="btn-mini">▶</button>
                        </div>
                    </div>
                    <div id="debugCardContainer" class="debug-card-container">
                        <div class="debug-card empty">目前尚無通訊紀錄</div>
                    </div>
                </section>
            </div>

            <!-- Playback Controls -->
            <section class="bento-item controls-basic">
                <div class="section-header">
                    <span class="section-title">播放與路徑</span>
                </div>
                <div class="button-stack">
                    <button id="toggleBtn" class="btn-primary">暫停自動播放</button>
                    <div class="button-row">
                        <button id="periodBtn" class="btn-secondary">單一週期</button>
                        <button id="reverseBtn" class="btn-secondary">反轉方向</button>
                    </div>
                    <div class="button-row">
                        <button id="slowMoBtn" class="btn-secondary">慢動作模式</button>
                        <button id="clearBtn" class="btn-secondary">清除軌跡</button>
                        <label class="checkbox-apple">
                            <input type="checkbox" id="showPathsCheck">
                            <span class="slider-check"></span>
                            <span class="label-text">軌跡</span>
                        </label>
                    </div>
                </div>
            </section>

            <!-- Environment Sliders -->
            <section class="bento-item controls-env">
                <div class="section-header">
                    <span class="section-title">模擬環境</span>
                </div>
                <div class="slider-stack">
                    <div class="apple-slider">
                        <div class="slider-info"><label>模擬速度</label><span id="speedVal">0.10x</span></div>
                        <input type="range" id="speedSlider" min="0.1" max="0.2" step="0.01" value="0.1">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>相位差</label><span id="phaseVal">180°</span></div>
                        <input type="range" id="phaseSlider" min="0" max="180" step="1" value="180">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>手動角度</label><span id="angleVal">0°</span></div>
                        <input type="range" id="angleSlider" min="0" max="360" step="1" value="0">
                    </div>

                </div>
            </section>

            <!-- Mechanical Geometry (Admin Only) -->
            <section class="bento-item controls-mech" id="adminSection">
                <div class="section-header">
                    <span class="section-title">機械構造設計</span>
                </div>
                <div class="grid-sliders">
                    <div class="apple-slider">
                        <div class="slider-info"><label>腳長 L<sub>leg</sub></label><span id="lLegVal">25</span></div>
                        <input type="range" id="lLegSlider" min="10" max="60" step="1" value="25">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>機械人長度 S</label><span id="sVal">48</span></div><input type="range"
                            id="sSlider" min="20" max="80" step="1" value="48">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>(藍色)直桿 L<sub>blue</sub></label><span id="lBlueVal">55</span></div>
                        <input type="range" id="lBlueSlider" min="40" max="100" step="1" value="55">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>機械人高度 L<sub>foot</sub></label><span id="lFootVal">20.0</span></div>
                        <input type="range" id="lFootSlider" min="19" max="100" step="1" value="20.0">
                    </div>
                    <div class="apple-slider">
                        <div class="slider-info"><label>齒輪箱位移</label><span id="gearboxShiftVal">0</span></div><input
                            type="range" id="gearboxShiftSlider" min="-10" max="10" step="0.5" value="0">
                    </div>

                    <div class="hole-selector">
                        <label>曲柄孔位 (R)</label>
                        <div class="segmented-control">
                            <button id="crankHole1Btn" class="hole-btn active">1</button>
                            <button id="crankHole2Btn" class="hole-btn">2</button>
                            <button id="crankHole3Btn" class="hole-btn">3</button>
                            <button id="crankHole4Btn" class="hole-btn">4</button>
                        </div>
                    </div>
                </div>
            </section>

        </main>
    </div>



    <!-- 載入外部內容 -->
    <script type="module" src="svgs.js"></script>
    <script type="module" src="bg_scroll.js"></script>
    <script type="module" src="simulation.js"></script>
    <script type="module" src="chat.js"></script>

    <!-- UI Tab Switch Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const showChatBtn = document.getElementById('showChatBtn');
            const showLogBtn = document.getElementById('showLogBtn');
            const chatPanel = document.getElementById('chatPanel');
            const logPanel = document.getElementById('logPanel');

            showChatBtn.addEventListener('click', () => {
                showChatBtn.classList.add('active');
                showLogBtn.classList.remove('active');
                chatPanel.classList.add('active-panel');
                logPanel.classList.remove('active-panel');
            });

            showLogBtn.addEventListener('click', () => {
                showLogBtn.classList.add('active');
                showChatBtn.classList.remove('active');
                logPanel.classList.add('active-panel');
                chatPanel.classList.remove('active-panel');
            });
        });
    </script>
</body>


</html>
