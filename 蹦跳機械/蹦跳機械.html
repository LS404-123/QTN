<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Robot Mechanism</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            background-color: #f0f4f8;
            font-family: sans-serif;
            overflow: hidden;
        }

        .app-container {
            background-color: #ffffff;
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
        }

        .canvas-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8f9fa;
            min-width: 0;
            overflow: hidden;
        }

        svg {
            display: block;
        }

        .control-panel {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid #eee;
        }

        .control-panel label {
            font-weight: 600;
            color: #444;
            white-space: nowrap;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: #fbc02d;
            cursor: pointer;
        }

        .speed-value {
            font-weight: bold;
            color: #222;
            width: 45px;
            text-align: right;
            font-family: monospace;
            font-size: 1.1em;
        }

        .settings-panel {
            background-color: #f1f3f5;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-size: 0.85em;
        }

        .settings-group {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .settings-group h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1em;
            color: #555;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .setting-row label {
            width: 100px;
            font-weight: 500;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .button-row button {
            flex: 1;
            padding: 8px;
            font-size: 0.9em;
            cursor: pointer;
            border-radius: 5px;
            border: 1px solid #ccc;
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="canvas-wrapper">
            <svg id="main-svg" style="width:100%; height:100%;" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">

                <!-- Definitions for filters and gradients -->
                <defs>
                    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
                        <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.15" />
                    </filter>

                    <linearGradient id="board-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffeb3b" />
                        <stop offset="100%" stop-color="#fbc02d" />
                    </linearGradient>

                    <linearGradient id="wood-gradient" x1="0%" y1="0%" x2="10%" y2="100%">
                        <stop offset="0%" stop-color="#fae5c8" />
                        <stop offset="100%" stop-color="#e8cd9d" />
                    </linearGradient>

                    <linearGradient id="ring-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#f5f5f5" />
                        <stop offset="100%" stop-color="#e0e0e0" />
                    </linearGradient>
                </defs>

                <g id="ground">
                    <!-- Main horizontal ground line -->
                    <line id="ground-line" x1="-50000" y1="0" x2="50000" y2="0" stroke="#777777" stroke-width="4"
                        stroke-linecap="round" />
                    <!-- Ruler tick marks every 100px -->
                    <g id="ground-ticks" fill="#999" font-size="11" font-family="monospace" text-anchor="middle">
                        <script>
                            (() => {
                                const g = document.getElementById('ground-ticks');
                                for (let x = -5000; x <= 6000; x += 100) {
                                    const isMajor = x % 500 === 0;
                                    const h = isMajor ? 16 : 8;
                                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                                    line.setAttribute('x1', x); line.setAttribute('y1', 0);
                                    line.setAttribute('x2', x); line.setAttribute('y2', h);
                                    line.setAttribute('stroke', isMajor ? '#666' : '#aaa');
                                    line.setAttribute('stroke-width', isMajor ? 2 : 1);
                                    g.appendChild(line);
                                    if (isMajor) {
                                        const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                                        txt.setAttribute('x', x); txt.setAttribute('y', h + 14);
                                        txt.setAttribute('fill', '#888');
                                        txt.textContent = x + 'px';
                                        g.appendChild(txt);
                                    }
                                }
                            })();
                        </script>
                    </g>
                    <!-- Ground hatching container -->
                    <g id="ground-hatching"></g>
                    <!-- CONTACT POINT MARKERS (WORLD SPACE) -->
                    <g id="contact-points-group"></g>
                </g>

                <!-- ROBOT ASSEMBLY -->
                <g id="robot-wrapper">
                    <!-- geometry group -->
                    <g id="robot-geometry">
                        <!-- LEFT ASSEMBLY: White/Grey Ring -->
                        <g id="left-ring">
                            <circle id="ring-main" cx="170" cy="285" r="65" fill="none" stroke="url(#ring-gradient)"
                                stroke-width="8" filter="url(#drop-shadow)" />
                            <circle id="ring-outer" cx="170" cy="285" r="69" fill="none" stroke="#cccccc"
                                stroke-width="1" />
                            <circle id="ring-inner" cx="170" cy="285" r="61" fill="none" stroke="#cfcfcf"
                                stroke-width="1" />
                        </g>

                        <!-- MAIN BODY: Yellow Horizontal Board -->
                        <g id="main-body" filter="url(#drop-shadow)">
                            <rect x="60" y="200" width="50" height="15" fill="url(#wood-gradient)" rx="5" />
                            <rect x="90" y="200" width="610" height="15" fill="url(#board-gradient)" />
                            <rect x="90" y="215" width="610" height="5" fill="#f5b000" />
                        </g>

                        <!-- BATTERY BOX (At the back of the yellow body) -->
                        <g id="battery-box" filter="url(#drop-shadow)">
                            <rect x="610" y="150" width="80" height="50" fill="#222222" rx="6" />
                            <rect x="615" y="160" width="70" height="30" fill="none" stroke="#444444" stroke-width="2"
                                rx="3" />
                        </g>

                        <!-- MIDDLE ASSEMBLY: Suspended Crane Mechanism -->
                        <g id="crane-assembly">
                            <rect x="390" y="175" width="20" height="25" fill="#999999" rx="3" />
                            <rect x="392" y="175" width="16" height="25" fill="#a8a8a8" rx="2" />
                            <g transform="translate(400, 185)">
                                <g id="crane-spin-group">
                                    <rect x="-10" y="-10" width="20" height="70" fill="#5fcaf0" rx="8"
                                        filter="url(#drop-shadow)" />
                                    <rect x="-8" y="-8" width="16" height="66" fill="none" stroke="#a0e4fa"
                                        stroke-width="1" rx="6" />
                                    <circle cx="0" cy="0" r="5" fill="#e0e0e0" stroke="#666666" stroke-width="1.5" />
                                    <circle cx="0" cy="0" r="2" fill="#444444" />
                                    <g filter="url(#drop-shadow)">
                                        <rect x="0" y="50" width="60" height="60" fill="url(#wood-gradient)"
                                            stroke="#cba371" stroke-width="2" transform="rotate(45, 0, 50)" />
                                    </g>
                                </g>
                            </g>
                        </g>

                        <!-- RIGHT ASSEMBLY: Wooden Walking Leg Structure -->
                        <g id="right-leg-assembly" filter="url(#drop-shadow)">
                            <rect x="635" y="215" width="65" height="215" fill="url(#wood-gradient)" rx="1" />
                            <line x1="635" y1="215" x2="635" y2="430" stroke="#dcb98a" stroke-width="1" />
                            <line x1="700" y1="215" x2="700" y2="430" stroke="#dcb98a" stroke-width="1" />
                            <line x1="635" y1="430" x2="700" y2="430" stroke="#dcb98a" stroke-width="1" />
                            <g transform="translate(700, 430) rotate(30.17)">
                                <rect x="-65" y="0" width="65" height="220" fill="url(#wood-gradient)" rx="1" />
                                <line x1="-65" y1="0" x2="-65" y2="220" stroke="#dcb98a" stroke-width="1" />
                                <line x1="0" y1="0" x2="0" y2="220" stroke="#dcb98a" stroke-width="1" />
                                <line x1="-65" y1="0" x2="0" y2="0" stroke="#cba371" stroke-width="1.5" />
                                <line x1="-65" y1="220" x2="0" y2="220" stroke="#dcb98a" stroke-width="1" />
                            </g>
                        </g>
                    </g>
                    <!-- CONTACT POINT MARKERS (MOVED TO GROUND) -->
                    <!-- CENTER OF MASS MARKER -->
                    <g id="com-marker">
                        <circle cx="0" cy="0" r="12" fill="none" stroke="#e91e63" stroke-width="2" />
                        <line x1="-16" y1="0" x2="16" y2="0" stroke="#e91e63" stroke-width="2" />
                        <line x1="0" y1="-16" x2="0" y2="16" stroke="#e91e63" stroke-width="2" />
                        <circle cx="0" cy="0" r="4" fill="#e91e63" />
                        <text x="14" y="-14" fill="#e91e63" font-size="14" font-family="sans-serif"
                            font-weight="bold">COM</text>
                    </g>
                </g>

                <!-- Error Overlay -->
                <g id="error-overlay" style="display: none;">
                    <rect x="0" y="0" width="800" height="600" fill="rgba(255,0,0,0.15)" />
                    <text x="400" y="300" fill="#cc0000" font-size="24" font-family="sans-serif" font-weight="bold"
                        text-anchor="middle">幾何約束衝突！機器人已穿入地面。</text>
                </g>

                <!-- Debug Indicator -->
                <g id="debug-indicator-group" transform="translate(10, 30)">
                    <rect x="0" y="-20" width="900" height="40" fill="rgba(255,255,255,0.9)" rx="4"
                        filter="url(#drop-shadow)" />
                    <text id="debug-indicator" x="10" y="0" fill="#222" font-size="14" font-family="monospace">PVC Pen:
                        0.0px</text>
                </g>
            </svg>
        </div>

        <div class="sidebar">
            <div class="control-panel">
                <div class="setting-row">
                    <label>Crane Speed</label>
                    <input type="range" id="speedSlider" min="0.2" max="5" step="0.2" value="1">
                    <span id="speedDisplay">1.0x</span>
                </div>
                <div class="setting-row">
                    <label>Ring X</label>
                    <input type="range" id="ringXSlider" min="100" max="260" step="1" value="150">
                    <span id="ringXDisplay">150</span>
                </div>
                <div class="setting-row">
                    <label>Drop Tilt</label>
                    <input type="range" id="tiltSlider" min="-45" max="45" step="1" value="0">
                    <span id="tiltDisplay">0°</span>
                </div>
                <div class="setting-row">
                    <label>POV Mode</label>
                    <select id="povSelect" style="flex:1">
                        <option value="world">World centric</option>
                        <option value="robot">Robot centric</option>
                    </select>
                </div>
                <div class="button-row">
                    <button id="motorToggle">Stop Motor</button>
                    <button id="resetBtn">Prepare Space</button>
                </div>
                <div class="button-row" style="gap: 5px;">
                    <button id="quickDropBtn" style="background-color: #81c784; color: white; border: none; font-weight: bold; flex: 2;">Quick Drop (一鍵投放)</button>
                    <button id="pauseToggle" style="flex: 1;">Hold</button>
                </div>
            </div>

            <div class="settings-panel">
                <div class="settings-group">
                    <h3>PVC (Front Ring)</h3>
                    <div class="setting-row">
                        <label>Stiffness (K)</label>
                        <input type="range" id="kPvc" min="500" max="10000" step="100" value="3000">
                        <span id="kPvcVal">3000</span>
                    </div>
                    <div class="setting-row">
                        <label>Damping (D)</label>
                        <input type="range" id="dPvc" min="0" max="200" step="5" value="60">
                        <span id="dPvcVal">60</span>
                    </div>
                    <div class="setting-row">
                        <label>Friction (μ)</label>
                        <input type="range" id="muPvc" min="0" max="1" step="0.05" value="0.3">
                        <span id="muPvcVal">0.3</span>
                    </div>
                </div>

                <div class="settings-group">
                    <h3>WOOD (Back Leg)</h3>
                    <div class="setting-row">
                        <label>Stiffness (K)</label>
                        <input type="range" id="kWood" min="5000" max="50000" step="1000" value="20000">
                        <span id="kWoodVal">20000</span>
                    </div>
                    <div class="setting-row">
                        <label>Damping (D)</label>
                        <input type="range" id="dWood" min="0" max="1000" step="10" value="300">
                        <span id="dWoodVal">300</span>
                    </div>
                    <div class="setting-row">
                        <label>Friction (μ)</label>
                        <input type="range" id="muWood" min="0" max="1" step="0.05" value="0.4">
                        <span id="muWoodVal">0.4</span>
                    </div>
                </div>

                <div class="settings-group">
                    <h3>Global Physics</h3>
                    <div class="setting-row">
                        <label>Gravity</label>
                        <input type="range" id="gVal" min="0" max="15000" step="500" value="5000">
                        <span id="gDisplay">5000</span>
                    </div>
                    <div class="setting-row" style="flex:1">
                        <label>Friction Gain</label>
                        <input type="range" id="fGain" min="1" max="2000" step="1" value="100">
                        <span id="fGainVal">100</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const slider = document.getElementById('speedSlider');
        const display = document.getElementById('speedDisplay');
        const ringXSlider = document.getElementById('ringXSlider');
        const ringXDisplay = document.getElementById('ringXDisplay');
        const tiltSlider = document.getElementById('tiltSlider');
        const tiltDisplay = document.getElementById('tiltDisplay');
        const povSelect = document.getElementById('povSelect');
        const craneGroup = document.getElementById('crane-spin-group');
        const robotWrapper = document.getElementById('robot-wrapper');
        const robotGeometry = document.getElementById('robot-geometry');
        const motorBtn = document.getElementById('motorToggle');
        const resetBtn = document.getElementById('resetBtn');
        const quickDropBtn = document.getElementById('quickDropBtn');
        const pauseToggle = document.getElementById('pauseToggle');
        const debugIndicator = document.getElementById('debug-indicator');
        const mainSvg = document.getElementById('main-svg');
        const leftRingGroup = document.getElementById('left-ring');
        const contactPointsGroup = document.getElementById('contact-points-group');

        // Create a pool of contact point dots
        const contactDots = [];
        for (let i = 0; i < 20; i++) {
            const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            dot.setAttribute('r', '4');
            dot.setAttribute('fill', '#ff1744');
            dot.setAttribute('style', 'display: none;');
            contactPointsGroup.appendChild(dot);
            contactDots.push(dot);
        }

        window.lastFinalComX = 400;
        window.lastFinalComY = 300;

        const BASE_SPEED = 1000;
        let currentAngle = 0;
        let lastTime = null;
        let speedMultiplier = parseFloat(slider.value);
        let motorRunning = true;

        motorBtn.addEventListener('click', () => {
            motorRunning = !motorRunning;
            motorBtn.textContent = motorRunning ? 'Stop Motor' : 'Start Motor';
            motorBtn.style.backgroundColor = motorRunning ? '#e0e0e0' : '#ffcdd2';
        });

        function prepareRobot() {
            physics.angle = parseFloat(tiltSlider.value) * Math.PI / 180;
            physics.x = 400;
            physics.y = 50;
            physics.vx = 0;
            physics.vy = 0;
            physics.omega = 0;
            physics.isPaused = true;
            window.lastFinalComX = 400;
            window.lastFinalComY = 300;
        }

        resetBtn.addEventListener('click', prepareRobot);

        quickDropBtn.addEventListener('click', () => {
            prepareRobot();
            physics.isPaused = false;
        });

        pauseToggle.addEventListener('click', () => {
            physics.isPaused = !physics.isPaused;
            pauseToggle.textContent = physics.isPaused ? 'Resume' : 'Hold';
        });

        // [Part 3] Full 2D Rigid Body Physics State
        const physics = {
            isPaused: true,
            x: 400, // COM horizontal position (world space)
            y: 50, // COM altitude 
            angle: parseFloat(tiltSlider.value) * Math.PI / 180, // radians
            vx: 0,
            vy: 0,
            omega: 0,
            mass: 1, // Will be updated dynamically
            inertia: 20000, // Will be updated dynamically
            gravity: 5000
        };

        slider.addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            display.textContent = speedMultiplier.toFixed(1) + 'x';
        });

        // Physics Tuning UI
        const settings = {
            kPvc: document.getElementById('kPvc'),
            dPvc: document.getElementById('dPvc'),
            muPvc: document.getElementById('muPvc'),
            kWood: document.getElementById('kWood'),
            dWood: document.getElementById('dWood'),
            muWood: document.getElementById('muWood'),
            gravity: document.getElementById('gVal'),
            fGain: document.getElementById('fGain')
        };

        Object.keys(settings).forEach(id => {
            const el = settings[id];
            const displayEl = document.getElementById(id + 'Val') || document.getElementById('gDisplay');
            el.addEventListener('input', () => {
                if (displayEl) displayEl.textContent = el.value;
            });
        });

        tiltSlider.addEventListener('input', (e) => {
            const deg = parseFloat(e.target.value);
            tiltDisplay.textContent = deg + '°';
            physics.angle = deg * Math.PI / 180;
            // When adjusting slider, hold robot in air to view the change
            physics.x = 400;
            physics.y = 50;
            physics.vx = 0;
            physics.vy = 0;
            physics.omega = 0;
            physics.isPaused = true;
        });

        const comMarker = document.getElementById('com-marker');
        const DENSITY_WOOD = 0.6;
        const DENSITY_PVC = 1.3;
        const DENSITY_METAL = 5.0;
        const DENSITY_BATTERY = 4.0;

        let RING_CX = parseFloat(ringXSlider.value);
        const RING_CY = 285;
        const RING_R_OUTER = 69;
        const RING_R_INNER = 61;

        function initRingSVG() {
            const main = document.getElementById('ring-main');
            const outer = document.getElementById('ring-outer');
            const inner = document.getElementById('ring-inner');
            const midR = (RING_R_OUTER + RING_R_INNER) / 2;
            const strokeW = RING_R_OUTER - RING_R_INNER;

            [main, outer, inner].forEach(c => {
                c.setAttribute('cx', RING_CX);
                c.setAttribute('cy', RING_CY);
            });
            main.setAttribute('r', midR);
            main.setAttribute('stroke-width', strokeW);
            outer.setAttribute('r', RING_R_OUTER);
            inner.setAttribute('r', RING_R_INNER);
        }
        initRingSVG();

        const staticParts = [
            { name: "Ring", area: Math.PI * (RING_R_OUTER * RING_R_OUTER - RING_R_INNER * RING_R_INNER), density: DENSITY_PVC, cx: RING_CX, cy: RING_CY, w: 130, h: 130, isCircle: true },
            { name: "Main Board", area: 610 * 20, density: DENSITY_WOOD, cx: 395, cy: 210, w: 610, h: 20 },
            { name: "Left Tip", area: 50 * 15, density: DENSITY_WOOD, cx: 85, cy: 207.5, w: 50, h: 15 },
            { name: "Right Thigh", area: 65 * 215, density: DENSITY_WOOD, cx: 667.5, cy: 322.5, w: 65, h: 215 },
            { name: "Battery Box", area: 80 * 50, density: DENSITY_BATTERY, cx: 650, cy: 175, w: 80, h: 50 },
            { name: "Right Calf", area: 65 * 220, density: DENSITY_WOOD, cx: 615.16, cy: 507.20, w: 65, h: 220 },
            { name: "Crane Bracket", area: 900, density: DENSITY_METAL, cx: 400, cy: 187.5, w: 20, h: 25 }
        ];

        let totalStaticMass = 0, staticCxSum = 0, staticCySum = 0;
        staticParts.forEach(p => {
            let mass = p.area * p.density;
            totalStaticMass += mass;
            staticCxSum += p.cx * mass;
            staticCySum += p.cy * mass;
        });

        ringXSlider.addEventListener('input', (e) => {
            RING_CX = parseFloat(e.target.value);
            ringXDisplay.textContent = Math.round(RING_CX);

            staticParts[0].cx = RING_CX;
            totalStaticMass = 0;
            staticCxSum = 0;
            staticCySum = 0;
            staticParts.forEach(p => {
                let m = p.area * p.density;
                totalStaticMass += m;
                staticCxSum += p.cx * m;
                staticCySum += p.cy * m;
            });
            initRingSVG();
        });

        const armArea = 20 * 70;
        const armMass = armArea * DENSITY_METAL;
        const armLocalCy = 25;

        const diaArea = 60 * 60;
        const diaMass = diaArea * DENSITY_WOOD;
        const diaLocalCy = 92.426;

        const cranePivotX = 400;
        const cranePivotY = 185;

        // --- Pre-calculated Back Leg Joint Pos (relative to world at start) ---
        const legAngle = 30.17 * Math.PI / 180;
        const cosL = Math.cos(legAngle);
        const sinL = Math.sin(legAngle);
        const brX = 700 + (0 * cosL - 220 * sinL);
        const brY = 430 + (0 * sinL + 220 * cosL);
        const blX = 700 + (-65 * cosL - 220 * sinL);
        const blY = 430 + (-65 * sinL + 220 * cosL);

        // Ensure legacy physics is overridden natively
        function animate(time) {
            if (lastTime === null) { lastTime = time; }
            const deltaTime = Math.min((time - lastTime) / 1000, 0.05); 
            lastTime = time;

            // Camera/View Constants
            const svgW = mainSvg.clientWidth;
            const svgH = mainSvg.clientHeight;
            const virtualH = 900;
            const virtualW = virtualH * (svgW / svgH);
            const GROUND_Y = 800; // Shared ground Y
            const SCREEN_CENTER_X = virtualW / 2;

            // --- Rigid Body Spring-Damper Physics ---
            const MAT = {
                'PVC': { K: parseFloat(settings.kPvc.value), D: parseFloat(settings.dPvc.value), mu: parseFloat(settings.muPvc.value) },
                'WOOD': { K: parseFloat(settings.kWood.value), D: parseFloat(settings.dWood.value), mu: parseFloat(settings.muWood.value) }
            };
            physics.gravity = parseFloat(settings.gravity.value);
            const frictionGain = parseFloat(settings.fGain.value);

            const SUBSTEPS = 15;
            const subDT = deltaTime / SUBSTEPS;
            let maxPvcPenetration = 0;
            let maxPtVx = 0;
            const currentFrameContacts = [];

            for (let step = 0; step < SUBSTEPS; step++) {
                if (motorRunning) {
                    currentAngle += (BASE_SPEED * speedMultiplier * subDT); // Update at sub-step resolution
                    currentAngle = currentAngle % 360;
                }
                const radC = currentAngle * Math.PI / 180;
                const cosA = Math.cos(radC), sinA = Math.sin(radC);

                // Sub-step COM update
                const armGlobalX = cranePivotX - armLocalCy * sinA;
                const armGlobalY = cranePivotY + armLocalCy * cosA;
                const diaGlobalX = cranePivotX - diaLocalCy * sinA;
                const diaGlobalY = cranePivotY + diaLocalCy * cosA;

                const totalMass = totalStaticMass + armMass + diaMass;
                const finalComX = (staticCxSum + armGlobalX * armMass + diaGlobalX * diaMass) / totalMass;
                const finalComY = (staticCySum + armGlobalY * armMass + diaGlobalY * diaMass) / totalMass;

                // Update physics mass and dynamically calculate Inertia
                physics.mass = totalMass;
                let momentInertia = 0;
                
                // Static parts Contribution to I
                staticParts.forEach(p => {
                    const m = p.area * p.density;
                    const dx = p.cx - finalComX;
                    const dy = p.cy - finalComY;
                    let icm = 0;
                    if (p.isCircle) {
                        icm = 0.5 * m * (RING_R_OUTER * RING_R_OUTER + RING_R_INNER * RING_R_INNER);
                    } else {
                        icm = (1/12) * m * (p.w * p.w + p.h * p.h);
                    }
                    momentInertia += icm + m * (dx * dx + dy * dy);
                });
                // Dynamic Crane parts Contribution to I
                const armDx = armGlobalX - finalComX, armDy = armGlobalY - finalComY;
                momentInertia += (1/12) * armMass * (20*20 + 70*70) + armMass * (armDx*armDx + armDy*armDy);
                const diaDx = diaGlobalX - finalComX, diaDy = diaGlobalY - finalComY;
                momentInertia += (1/12) * diaMass * (60*60 + 60*60) + diaMass * (diaDx*diaDx + diaDy*diaDy);
                physics.inertia = momentInertia;

                // Shapes relative to CURRENT sub-step COM
                const shapes = [
                    { type: 'PVC', shape: 'circle', cx: RING_CX - finalComX, cy: RING_CY - finalComY, r: RING_R_OUTER },
                    { type: 'WOOD', shape: 'point', dx: brX - finalComX, dy: brY - finalComY },
                    { type: 'WOOD', shape: 'point', dx: blX - finalComX, dy: blY - finalComY },
                    // NEW: Body Collision Points (Main Board Corners)
                    { type: 'WOOD', shape: 'point', dx: 90 - finalComX, dy: 200 - finalComY },
                    { type: 'WOOD', shape: 'point', dx: 700 - finalComX, dy: 200 - finalComY },
                    { type: 'WOOD', shape: 'point', dx: 90 - finalComX, dy: 220 - finalComY },
                    { type: 'WOOD', shape: 'point', dx: 700 - finalComX, dy: 220 - finalComY }
                ];

                let totalFx = 0; // Horizontal forces
                let totalFy = physics.mass * physics.gravity; // Gravity Down
                let totalTorque = 0;
                const cR = Math.cos(physics.angle), sR = Math.sin(physics.angle);

                // --- Scale factor for UI settings since physics.mass is now much larger ---
                // We divide forces by this factor in integral or multiply UI K/D
                // But easier: divide calculated accelerations if we want to keep feel.
                // However, user said "update physics core", so I will use raw mass logic.
                // To keep stability, I will multiply K/D internally by a scale factor.
                const massScale = 55000; 
                const gainK = MAT['PVC'].K * massScale, gainD = MAT['PVC'].D * massScale;
                const woodGainK = MAT['WOOD'].K * massScale, woodGainD = MAT['WOOD'].D * massScale;

                shapes.forEach(sh => {
                    if (sh.shape === 'point') {
                        const wx = cR * sh.dx - sR * sh.dy;
                        const wy = sR * sh.dx + cR * sh.dy;
                        const worldY = physics.y + wy;
                        if (worldY > GROUND_Y) {
                            const penetration = worldY - GROUND_Y;
                            const ptVy = physics.vy + physics.omega * wx;
                            const K = MAT[sh.type].K * massScale;
                            const D = MAT[sh.type].D * massScale;
                            const forceY = -K * penetration - D * ptVy;
                            if (forceY < 0) {
                                totalFy += forceY;
                                totalTorque += wx * forceY;
                                if (step === SUBSTEPS - 1) {
                                    currentFrameContacts.push({ x: physics.x + wx, y: worldY });
                                }
                                // --- Friction ---
                                const ptVx = physics.vx - physics.omega * wy;
                                const maxFriction = MAT[sh.type].mu * Math.abs(forceY);
                                const frictionX = Math.abs(ptVx) < 2 ? 0 :
                                    -Math.sign(ptVx) * Math.min(maxFriction, Math.abs(ptVx) * frictionGain * massScale);
                                totalFx += frictionX;
                                totalTorque += -wy * frictionX;
                            }
                        }
                    } else if (sh.shape === 'circle') {
                        const wx = cR * sh.cx - sR * sh.cy;
                        const wy = sR * sh.cx + cR * sh.cy;
                        const worldY = physics.y + wy + sh.r;
                        if (worldY > GROUND_Y) {
                            const penetration = worldY - GROUND_Y;
                            maxPvcPenetration = Math.max(maxPvcPenetration, penetration);
                            const ptVy = physics.vy + physics.omega * wx;
                            const K = MAT[sh.type].K * massScale;
                            const D = MAT[sh.type].D * massScale;
                            const forceY = -K * penetration - D * ptVy;
                            if (forceY < 0) {
                                totalFy += forceY;
                                totalTorque += wx * forceY;
                                if (step === SUBSTEPS - 1) {
                                    currentFrameContacts.push({ x: physics.x + wx, y: worldY });
                                }
                                // --- Friction ---
                                const ptVx = physics.vx - physics.omega * (wy + sh.r);
                                const maxFriction = MAT[sh.type].mu * Math.abs(forceY);
                                const frictionX = Math.abs(ptVx) < 2 ? 0 :
                                    -Math.sign(ptVx) * Math.min(maxFriction, Math.abs(ptVx) * frictionGain * massScale);
                                totalFx += frictionX;
                                if (Math.abs(ptVx) > maxPtVx) maxPtVx = Math.abs(ptVx);
                                totalTorque += -(wy + (sh.r || 0)) * frictionX;
                            }
                        }
                    }
                });

                // Integrate if not paused
                if (!physics.isPaused) {
                    // Angular damping (air resistance to spin)
                    const angularDamping = -0.5 * physics.omega;
                    totalTorque += angularDamping * physics.inertia;

                    physics.vx += (totalFx / physics.mass) * subDT;
                    physics.vy += (totalFy / physics.mass) * subDT;
                    physics.omega += (totalTorque / physics.inertia) * subDT;
                    // Clamp small residual velocities to zero
                    if (Math.abs(physics.vx) < 2 && Math.abs(totalFx) < 1) physics.vx = 0;
                    if (Math.abs(physics.omega) < 0.01) physics.omega = 0;
                    physics.x += physics.vx * subDT;
                    physics.y += physics.vy * subDT;
                    physics.angle += physics.omega * subDT;
                }

                if (step === SUBSTEPS - 1) {
                    const fpad = (n, len) => n.toFixed(1).padStart(len, ' ');
                    const ipad = (n, len) => Math.round(n).toString().padStart(len, ' ');

                    // Final visual markers update
                    comMarker.setAttribute('transform', `translate(${finalComX.toFixed(2)}, ${finalComY.toFixed(2)})`);
                    craneGroup.setAttribute('transform', `rotate(${currentAngle}, 0, 0)`);
                    window.lastFinalComX = finalComX;
                    window.lastFinalComY = finalComY;
                    
                    const degBodyDisplay = fpad(physics.angle * 180 / Math.PI, 6);
                    const omegaDisplay = fpad(physics.omega * 180 / Math.PI, 6);
                    const vxDisplay = fpad(physics.vx, 7);
                    const vyDisplay = fpad(physics.vy, 7);
                    const penDisplay = fpad(maxPvcPenetration, 5);
                    const ptVxDisplay = fpad(maxPtVx, 6);
                    const distDisplay = ipad(physics.x - 400, 6);

                    const telemetryText = `PVC Pen: ${penDisplay}px | Max ptVx: ${ptVxDisplay}px/s | Vx: ${vxDisplay} | Vy: ${vyDisplay} | ω: ${omegaDisplay}°/s | Angle: ${degBodyDisplay}° | Dist X: ${distDisplay}px`;
                    
                    if (debugIndicator.textContent !== telemetryText) {
                        debugIndicator.textContent = telemetryText;
                        const textWidth = debugIndicator.getComputedTextLength();
                        const bgRect = document.querySelector('#debug-indicator-group rect');
                        if (bgRect) bgRect.setAttribute('width', (textWidth + 30).toString());
                    }
                }
            }

            // --- Visual SVG Deformation for PVC Spring ---
            // If the spring pushes into the floor computationally, we squash the SVG proportionally
            // squashed relative to the true Global Y axis, not local Y.
            const rOuter = RING_R_OUTER;
            const degBody = physics.angle * 180 / Math.PI;
            const scaleY = Math.max(0.4, (rOuter - maxPvcPenetration) / rOuter);
            const scaleX = 1 / Math.sqrt(scaleY);

            leftRingGroup.setAttribute('transform', `
                translate(${RING_CX}, ${RING_CY})
                rotate(${-degBody})
                scale(${scaleX}, ${scaleY})
                rotate(${degBody})
                translate(${-RING_CX}, ${-RING_CY})
            `);

            // Update Contact Point Dots
            contactDots.forEach((dot, i) => {
                if (i < currentFrameContacts.length) {
                    const pt = currentFrameContacts[i];
                    dot.setAttribute('cx', pt.x);
                    dot.setAttribute('cy', 0); // Ground group is already at Y=800
                    dot.setAttribute('style', 'display: block; opacity: 1.0;');
                } else {
                    dot.setAttribute('style', 'display: none;');
                }
            });

            // Update Debug Indicator
            // (Debug content handled inside sub-step)

            // --- Camera Render ---
            const pov = povSelect.value;
            mainSvg.setAttribute('viewBox', `0 0 ${virtualW} ${virtualH}`);

            const groundGroup = document.getElementById('ground');

            if (pov === 'world') {
                // Camera tracks robot horizontally, ground scrolls
                const camOffsetX = SCREEN_CENTER_X - physics.x;
                groundGroup.setAttribute('transform', `translate(${camOffsetX}, ${GROUND_Y})`);
                robotWrapper.setAttribute('transform', `
                    translate(${SCREEN_CENTER_X}, ${physics.y})
                    rotate(${degBody})
                    translate(${-window.lastFinalComX}, ${-window.lastFinalComY})
                `);
            } else {
                // Robot-centric: Fixed Robot in viewport center, Always Upright
                robotWrapper.setAttribute('transform', `
                    translate(${SCREEN_CENTER_X}, ${virtualH / 2})
                    translate(${-window.lastFinalComX}, ${-window.lastFinalComY})
                `);
                // Rotate and translate ground inversely
                groundGroup.setAttribute('transform', `
                    translate(${SCREEN_CENTER_X}, ${virtualH / 2})
                    rotate(${-degBody})
                    translate(${-physics.x}, ${GROUND_Y - physics.y})
                `);
            }

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>
</body>
