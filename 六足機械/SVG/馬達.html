<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <title>側板 Side Plate</title>
    <style>
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body>
    <svg viewBox="-2 -2 22 24" width="600" height="600" xmlns="http://www.w3.org/2000/svg">
        <!-- 
            側板 Dimensions:
            - 主矩形: 寬 15.50, 高 20.00
            - 右側圓角: R1.00 (右上、右下)
            - 內部切割孔: 寬 3.00, 高 7.50 (x: 7.50~10.50, y: 6.25~13.75)
            - 頂部水平線: y = 4.00, 長度 7.50
            - 底部水平線: y = 16.00, 長度 7.50
            - 中間垂直線: x = 7.50, 貫穿高 20.00
            - 右側凸出部: 高 10.00 (y: 5.00~15.00), 寬 2.50 (x: 15.50~18.00)
            - 右側缺口: 高 2.00 (y: 9.00~11.00), 深 1.00 (x: 17.00~18.00)
            - 右側凸出部的外圓角: 4個 R0.50
        -->
        <g id="side-plate" fill="none" stroke="#ff9800" stroke-width="0.2" stroke-linejoin="round">

            <!-- 1. 主矩形 (順時針) -->
            <path id="main_body" d="
                M 0,0 
                L 14.50,0 
                A 1,1 0 0,1 15.50,1.00 
                L 15.50,19.00 
                A 1,1 0 0,1 14.50,20.00 
                L 0,20.00 
                Z" />

            <!-- 2a. 右側主矩形 (2.50 寬 x 10.00 高, R0.50 圓角) -->
            <!--     x: 15.50~18.00, y: 5.00~15.00 -->
            <path id="right_main_rect" d="
                M 15.50, 5.00
                L 17.50, 5.00
                A 0.5,0.5 0 0,1 18.00, 5.50
                L 18.00, 14.50
                A 0.5,0.5 0 0,1 17.50, 15.00
                L 15.50, 15.00
                Z" />

            <!-- 2b. 右側小矩形，沿 X 軸再往右延伸 (1.00 寬 x 2.00 高, R0.50 圓角) -->
            <!--     x: 18.00~19.00, y: 9.00~11.00 -->
            <path id="right_small_rect" d="
                M 18.00, 9.00
                L 18.50, 9.00
                A 0.5,0.5 0 0,1 19.00, 9.50
                L 19.00, 10.50
                A 0.5,0.5 0 0,1 18.50, 11.00
                L 18.00, 11.00
                Z" />

            <!-- 3. 中間的切割孔 (逆時針挖洞) 
                 x: 7.50 ~ 10.50, y: 6.25 ~ 13.75 -->
            <path id="inner_cutout" d="
                M 7.50, 6.25 
                L 7.50, 13.75 
                L 10.50, 13.75 
                L 10.50, 6.25 
                Z" />

            <!-- 4. 內部參考線/折線 -->
            <!-- 中間貫穿的垂直線 -->
            <line x1="7.50" y1="0.00" x2="7.50" y2="20.00" />

            <!-- 左側頂部水平線 -->
            <line x1="0.00" y1="4.00" x2="7.50" y2="4.00" />

            <!-- 左側底部水平線 -->
            <line x1="0.00" y1="16.00" x2="7.50" y2="16.00" />
        </g>
    </svg>
</body>

</html>
