<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>太陽 SVG</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a2e;
        }
    </style>
</head>

<body>
    <svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="-200 -200 400 400">
        <defs>
            <!-- 太陽本體漸層 -->
            <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FFF176" />
                <stop offset="50%" stop-color="#FFEE58" />
                <stop offset="100%" stop-color="#FFB300" />
            </radialGradient>
            <!-- 光暈 -->
            <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#FFEE58" stop-opacity="0.4" />
                <stop offset="100%" stop-color="#FFEE58" stop-opacity="0" />
            </radialGradient>
        </defs>

        <!-- 外圈光暈 -->
        <circle cx="0" cy="0" r="180" fill="url(#glowGrad)" />

        <!-- 12 條光芒 (三角形射線) -->
        <g fill="#FFB300" opacity="0.85">
            <polygon points="0,-160 -12,-70 12,-70" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(30)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(60)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(90)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(120)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(150)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(180)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(210)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(240)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(270)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(300)" />
            <polygon points="0,-160 -12,-70 12,-70" transform="rotate(330)" />
        </g>

        <!-- 太陽本體 -->
        <circle cx="0" cy="0" r="65" fill="url(#sunGrad)" stroke="#F9A825" stroke-width="2" />
    </svg>
</body>

</html>
