<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六足機器人模擬器 - 姿態控制與效能統計</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>運動學模擬器：六足姿態控制與數據統計</h2>
    <canvas id="simCanvas" width="900" height="500"></canvas>

    <div class="control-panel">
        <!-- Section 1: 播放與基本控制 -->
        <div class="control-section">
            <div class="section-title">播放與路徑控制</div>
            <div class="control-row">
                <button id="toggleBtn">暫停自動播放</button>
                <button id="periodBtn">一個週期</button>
                <button id="reverseBtn" class="btn-secondary">反轉方向</button>
                <button id="clearBtn" class="btn-secondary">清除軌跡</button>
                <label class="checkbox-label">
                    <input type="checkbox" id="showPathsCheck"> <span>顯示軌跡</span>
                </label>
            </div>
        </div>

        <!-- Section 2: 模擬環境與視角 -->
        <div class="control-section">
            <div class="section-title">模擬環境與觀測</div>
            <div class="control-row">
                <div class="slider-group">
                    <label>模擬速度</label>
                    <input type="range" id="speedSlider" min="0.1" max="0.2" step="0.01" value="0.1">
                    <span class="val-display" id="speedVal">Low in battery</span>
                </div>
                <div class="slider-group">
                    <label>視角模式</label>
                    <select id="povSelect">
                        <option value="robot">以機器人為中心</option>
                        <option value="world" selected>以世界為中心</option>
                    </select>
                </div>
                <div class="slider-group">
                    <label>手動角度</label>
                    <input type="range" id="angleSlider" min="0" max="360" step="1" value="0">
                    <span class="val-display" id="angleVal">0°</span>
                </div>
                <div class="slider-group">
                    <label>相位差</label>
                    <input type="range" id="phaseSlider" min="0" max="180" step="1" value="180">
                    <span class="val-display" id="phaseVal">180°</span>
                </div>
            </div>
        </div>

        <!-- Section 3: 機械幾何與構造 -->
        <div class="control-section">
            <div class="section-title">機械幾何構造設計</div>
            <div class="control-row">
                <div class="slider-group">
                    <label>腿長 (L<sub>leg</sub>)</label>
                    <input type="range" id="lLegSlider" min="10" max="60" step="1" value="25">
                    <span class="val-display" id="lLegVal">25</span>
                </div>
                <div class="slider-group">
                    <label>臂長 (L<sub>blue</sub>)</label>
                    <input type="range" id="lBlueSlider" min="40" max="100" step="1" value="55">
                    <span class="val-display" id="lBlueVal">55</span>
                </div>
                <div class="slider-group disabled-group" title="比例鎖定 (36:45)">
                    <label>腳長 (L<sub>foot</sub>)</label>
                    <input type="range" id="lFootSlider" min="10" max="60" step="1" value="20" disabled>
                    <span class="val-display" id="lFootVal">20 (Fixed)</span>
                </div>
                
                <div class="slider-group">
                    <label>齒輪箱位移</label>
                    <input type="range" id="gearboxShiftSlider" min="-10" max="10" step="0.5" value="0">
                    <span class="val-display" id="gearboxShiftVal">0</span>
                </div>
                
                <div class="slider-group hole-selector-group">
                    <label>曲柄孔位 (R)</label>
                    <div class="segmented-control">
                        <button id="crankHole1Btn" class="hole-btn active">孔 1</button>
                        <button id="crankHole2Btn" class="hole-btn">孔 2</button>
                        <button id="crankHole3Btn" class="hole-btn">孔 3</button>
                        <button id="crankHole4Btn" class="hole-btn">孔 4</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 載入外部 SVG 原始幾何與模擬器邏輯 -->
    <script src="svgs.js"></script>
    <script src="simulation.js"></script>
</body>

</html>
