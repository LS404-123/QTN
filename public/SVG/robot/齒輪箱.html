<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <title>齒輪箱 Gearbox</title>
    <style>
        body {
            background: #1A1A2E;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body>
    <svg viewBox="-5 -5 70 35" width="700" height="350" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a2e">
        <!-- 
            本體總長: 50.00 mm
            底部為水平基準線 (y=25)
            
            x座標分段：
            - x=0: 左邊界
            - x=31.50: 內部分隔線 1
            - x=33.50: 內部分隔線 2 (2.00 mm 寬度)
            - x=43.75: 右側 C 字缺口左邊界 (52 - 8.25)
            - x=52.00: 右邊界
            
            y座標分段：
            - y=25: 底邊
            - y=25 - 4.34 = 20.66: C 字缺口下邊界
            - y=20.66 - 15.00 = 5.66: C 字缺口上邊界
            - y=5.66 - 4.34 = 1.32: 右方最高點 (頂邊斜線的右端)
            - y=0: 左上角最高點 (頂邊斜線的左端，這裡稍微斜向上接R2圓角)
        -->
        <g id="main-body" fill="#8a8d91" stroke="#fdfbf7" stroke-width="0.35" stroke-linejoin="round">
            <!-- 外圍輪廓 -->
            <!-- 外圍主體輪廓 -->
            <path d="
                M 2,0
                L 33.5, 1.32
                L 52, 1.32
                L 52, 25
                L 1, 25
                A 1,1 0 0,1 0,24
                L 0, 2
                A 2,2 0 0,1 2,0
                Z
            " />

            <!-- 右上角矩形 -->
            <rect x="43.75" y="1.32" width="8.25" height="4.34" />
            <!-- 右下角矩形 -->
            <rect x="43.75" y="20.66" width="8.25" height="4.34" />

            <!-- 內部直線 1 (x=31.5) -->
            <!-- 這條線是本體的邊界，所以高度跟著上面斜線一起算 -> y 落在 1.32 到 0 之間的某個高度 (約 1.25) -->
            <!-- 為簡單起見，直接以斜率計算： y = 1.32 * (31.5/33.5) = 1.24 -->
            <line x1="31.50" y1="1.24" x2="31.50" y2="25" />

            <!-- 內部直線 2 (x=33.5) -->
            <!-- 剛好是水平段開始的地方 -->
            <line x1="33.50" y1="1.32" x2="33.50" y2="25" />
        </g>

        <!-- ── Circle holes ───────────────────────────────────── -->
        <!-- 左孔: x = 11.50, y = 12.5 -->
        <g id="hole-left" stroke="#fdfbf7" stroke-width="0.35">
            <!-- 外圓環 (Annulus area) -->
            <circle cx="11.50" cy="12.50" r="3.50" fill="#808082" />
            <!-- 內圓 (Inner circle) -->
            <circle cx="11.50" cy="12.50" r="1.50" fill="#000000" />
        </g>

        <!-- 右孔: x = 11.50 + 13.50 = 25.00, y = 12.5 -->
        <g id="hole-right" stroke="#fdfbf7" stroke-width="0.35">
            <!-- 外圓環 (Annulus area) -->
            <circle cx="25.00" cy="12.50" r="3.50" fill="#808082" />
            <!-- 內圓 (Inner circle) -->
            <circle cx="25.00" cy="12.50" r="1.50" fill="#000000" />
        </g>

        <!-- ── Bottom key (小鍵) ─────────────────────────────── -->
        <!-- 位於 x=18.50, 但是這其實指中心線，方塊大約為 5x1 -->
        <g id="bottom-key" fill="#8a8d91" stroke="#fdfbf7" stroke-width="0.35">
            <rect x="16" y="24" width="5" height="1" />
            <!-- 十字標記/中心線 -->
            <line x1="18.50" y1="25" x2="18.50" y2="21.5" />
        </g>
    </svg>
</body>

</html>
