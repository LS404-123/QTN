<svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
    <!-- Stylized Wavy Round Canopy -->
    <path d="
        M 60, 20
        C 80, 15 100, 40 100, 65
        C 115, 80 110, 110 85, 115
        C 75, 125 45, 125 35, 115
        C 10, 110 5, 80 20, 65
        C 20, 40 40, 15 60, 20
        Z" 
        fill="#48bb78" 
        stroke="#5d4037" 
        stroke-width="3" 
        stroke-linejoin="round" />

    <!-- Internal Trunk and Organic Branches -->
    <line x1="60" y1="120" x2="60" y2="50" stroke="#5d4037" stroke-width="3.5" stroke-linecap="round" />
    <line x1="60" y1="100" x2="40" y2="80" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="60" y1="90" x2="85" y2="75" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="40" y1="80" x2="30" y2="70" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="60" y1="70" x2="70" y2="55" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />

    <!-- Ground Base Line -->
    <line x1="40" y1="145" x2="80" y2="145" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="60" y1="120" x2="60" y2="145" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
</svg>
