<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six-Legged Rigid Kinematics Simulation - Complete Paths</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
            margin-top: 1rem;
        }
        #simCanvas {
            background-color: #1a1a1a; /* 更深的背景，讓色彩對比更強烈 */
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.4);
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        label {
            font-size: 14px;
            color: #333;
        }
    </style>
</head>
<body>

    <h2>Six-Legged Robot Stride Analysis</h2>
    <canvas id="simCanvas" width="900" height="550"></canvas>
    
    <div class="controls">
        <button id="toggleBtn">Pause</button>
        <button id="clearPathBtn">Clear Paths</button>
        <label><input type="checkbox" id="showPathsCheck" checked> Show Trajectories</label>
    </div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // ==========================================
    // 1. 機構嚴格幾何參數 (保持絕對固定)
    // ==========================================
    const S = 48.0;        // 前/後腳固定點與曲柄中心的水平距離
    const R = 11.0;        // 齒輪箱曲柄半徑
    const L_leg = 46.0;    // 黃色腳：上孔到下孔的距離
    const L_blue = 67.0;   // 藍色連桿的絕對長度
    const L_foot = 26.0;   // 下孔到腳底板的延伸距離

    // 定義地面高度 (在數學座標系中 Y=-50 左右)
    // 經測試，最低點約在 Y=-51.5，我們將地面設在那裡
    const groundY = -51.5;

    // 定義固定點位置
    const Pf = { x: -S, y: 0 };
    const Pr = { x: S, y: 0 };
    const C_crank = { x: 0, y: 0 };

    let theta = 0;
    let isPlaying = true;
    let showPaths = true;

    // 儲存三隻腳的軌跡資料
    let pathF = [], pathM = [], pathR = [];
    const maxPathLen = 120; // 紀錄大約一個週期的長度

    // 畫布座標轉換工具
    const scale = 3.5; // 放大倍率
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 + 50; // 將中心點稍微往下移

    function mapCoords(p) {
        return {
            x: cx + p.x * scale,
            y: cy - p.y * scale 
        };
    }

    // ==========================================
    // 2. 幾何解析求解器 (JS 版本)
    // ==========================================
    function getIntersection(C1, r1, C2, r2) {
        const dx = C2.x - C1.x;
        const dy = C2.y - C1.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        
        // 檢查是否無法形成三角形 (機構卡死或物理限制)
        if (d > r1 + r2 || d < Math.abs(r1 - r2) || d === 0) return null;

        const a = (r1 * r1 - r2 * r2 + d * d) / (2 * d);
        const h_sq = r1 * r1 - a * a;
        const h = Math.sqrt(Math.max(0, h_sq));
        
        const P2x = C1.x + a * dx / d;
        const P2y = C1.y + a * dy / d;

        const P3a = { x: P2x - h * dy / d, y: P2y + h * dx / d };
        const P3b = { x: P2x + h * dy / d, y: P2y - h * dx / d };

        // 選擇 Y 座標較高的點，確保腳朝上
        return (P3a.y > P3b.y) ? P3a : P3b;
    }

    // 計算向量並延伸長度 (用於計算腳底板位置)
    function extendPoint(P_top, P_bottom, extensionLength) {
        const dx = P_bottom.x - P_top.x;
        const dy = P_bottom.y - P_top.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        return {
            x: P_bottom.x + (dx / dist) * extensionLength,
            y: P_bottom.y + (dy / dist) * extensionLength
        };
    }

    // ==========================================
    // 3. 渲染與動畫迴圈
    // ==========================================
    function drawLine(p1, p2, color, width) {
        if (!p1 || !p2) return;
        const m1 = mapCoords(p1);
        const m2 = mapCoords(p2);
        ctx.beginPath();
        ctx.moveTo(m1.x, m1.y);
        ctx.lineTo(m2.x, m2.y);
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    function drawPath(path, color) {
        if (!showPaths || path.length < 2) return;
        ctx.beginPath();
        const start = mapCoords(path[0]);
        ctx.moveTo(start.x, start.y);
        for (let i = 1; i < path.length; i++) {
            const pt = mapCoords(path[i]);
            ctx.lineTo(pt.x, pt.y);
        }
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]); // 虛線設定
        ctx.stroke();
        ctx.setLineDash([]); // 恢復實線
    }

    function animate() {
        if (isPlaying) {
            theta += 0.04; // 控制轉速
            if (theta > Math.PI * 2) theta -= Math.PI * 2;
        }

        // 清除畫布
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // --- 畫地面 (在最底層) ---
        // 我們畫一條從左延伸到右的粗灰線
        drawLine({x: -canvas.width/(2*scale), y: groundY}, {x: canvas.width/(2*scale), y: groundY}, '#555', 4);

        // --- 運動學計算 ---
        const ML = { x: R * Math.cos(theta), y: R * Math.sin(theta) }; // 中間腳下孔 (曲柄)
        const MT = getIntersection(ML, L_leg, Pf, L_blue);             // 中間腳上孔
        const FT = getIntersection(Pf, L_leg, ML, L_blue);             // 前腳上孔
        const RT = getIntersection(Pr, L_leg, ML, L_blue);             // 後腳上孔

        // 如果計算出錯（例如參數設定會導致卡死），直接跳過這幀
        if (MT && FT && RT) {
            
            // 計算腳底延伸點
            const foot_f = extendPoint(FT, Pf, L_foot);
            const foot_m = extendPoint(MT, ML, L_foot);
            const foot_r = extendPoint(RT, Pr, L_foot);

            // 紀錄軌跡資料
            if (isPlaying) {
                pathF.push(foot_f); pathM.push(foot_m); pathR.push(foot_r);
                if (pathF.length > maxPathLen) {
                    pathF.shift(); pathM.shift(); pathR.shift();
                }
            }

            // --- 畫軌跡 ---
            drawPath(pathF, 'rgba(255, 100, 100, 0.6)'); // 淡紅色 - 前腳
            drawPath(pathM, 'rgba(100, 255, 100, 0.6)'); // 淡綠色 - 中腳
            drawPath(pathR, 'rgba(100, 100, 255, 0.6)'); // 淡藍色 - 後腳

            // --- 畫零件 (疊在軌跡上面) ---
            // 1. 曲柄銷 (白色)
            drawLine(C_crank, ML, 'white', 3);

            // 2. 藍色連桿 (3根)
            drawLine(FT, ML, '#4da6ff', 5); // 左交叉 1
            drawLine(Pf, MT, '#4da6ff', 5); // 左交叉 2
            drawLine(ML, RT, '#4da6ff', 5); // 右側單一連桿

            // 3. 黃色腳 (疊在連桿上面)
            drawLine(FT, foot_f, '#ffcc00', 12); // 前腳
            drawLine(MT, foot_m, '#ffcc00', 12); // 中腳
            drawLine(RT, foot_r, '#ffcc00', 12); // 後腳

            // 畫固定點的裝飾圓點
            drawPoint(Pf, 'black', 4);
            drawPoint(Pr, 'black', 4);
            drawPoint(C_crank, 'black', 4);
        }

        requestAnimationFrame(animate);
    }

    function drawPoint(p, color, radius) {
        const mp = mapCoords(p);
        ctx.beginPath();
        ctx.arc(mp.x, mp.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
    }

    // ==========================================
    // 4. UI 事件綁定
    // ==========================================
    document.getElementById('toggleBtn').addEventListener('click', function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "Pause" : "Play";
    });

    document.getElementById('clearPathBtn').addEventListener('click', function() {
        pathF = []; pathM = []; pathR = [];
    });

    document.getElementById('showPathsCheck').addEventListener('change', function() {
        showPaths = this.checked;
    });

    // 啟動動畫
    animate();

</script>
</body>
</html>
