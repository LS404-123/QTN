<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <title>側板 Side Plate</title>
    <style>
        body {
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
    </style>
</head>

<body>
    <svg viewBox="-2 -2 22 24" width="600" height="600" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 裁切區域用於限制填充不超出主體邊界 -->
            <clipPath id="bodyClip">
                <path d="
                    M 0,0 
                    L 14.50,0 
                    A 1,1 0 0,1 15.50,1.00 
                    L 15.50,19.00 
                    A 1,1 0 0,1 14.50,20.00 
                    L 0,20.00 
                    Z" />
            </clipPath>
        </defs>

        <g id="side-plate" fill="none" stroke="#333333" stroke-width="0.1" stroke-linejoin="round">

            <!-- 1. 建立各區分色填充 (使用主體裁切) -->
            <g clip-path="url(#bodyClip)" class="fill-only">
                <!-- 右側區域 (x > 10.50): 白色 -->
                <rect x="10.50" y="0" width="10" height="20" fill="#ffffff" />

                <!-- 左側區域 (x < 10.50): 三段灰色 -->
                <rect x="0" y="0" width="10.50" height="4.00" fill="#e5e5e5" />
                <rect x="0" y="4.00" width="10.50" height="12.00" fill="#bbbbbb" />
                <rect x="0" y="16.00" width="10.50" height="4.00" fill="#e5e5e5" />
            </g>

            <!-- 1b. 主體外殼輪廓線 -->
            <path id="main_body" d="
                M 0,0 
                L 14.50,0 
                A 1,1 0 0,1 15.50,1.00 
                L 15.50,19.00 
                A 1,1 0 0,1 14.50,20.00 
                L 0,20.00 
                Z" />

            <!-- 2. 右側凸出部分 (淺灰填充) -->
            <path id="right_main_rect" fill="#f0f0f0" d="
                M 15.50, 5.00
                L 17.50, 5.00
                A 0.5,0.5 0 0,1 18.00, 5.50
                L 18.00, 14.50
                A 0.5,0.5 0 0,1 17.50, 15.00
                L 15.50, 15.00
                Z" />

            <path id="right_small_rect" fill="#DCDCDC" d="
                M 18.00, 9.00
                L 18.50, 9.00
                A 0.5,0.5 0 0,1 19.00, 9.50
                L 19.00, 10.50
                A 0.5,0.5 0 0,1 18.50, 11.00
                L 18.00, 11.00
                Z" />

            <!-- 3. 中間的切割孔 (深灰填充) -->
            <path id="inner_cutout" fill="#7a7a7a" d="
                M 10.50, 6.25 
                L 10.50, 13.75 
                L 13.50, 13.75 
                L 13.50, 6.25 
                Z" />

            <!-- 銅接點 Bronze Parts (Brushes) -->
            <g id="bronze-parts" fill="#cd7f32" stroke="#8b4513" stroke-width="0.1">
                <path id="bronze_top" d="
                    M 11.50, 6.25 
                    L 11.50, 3.25 
                    A 1.00,1.00 0 0,1 13.50, 3.25 
                    L 13.50, 6.25 
                    Z" />
                <path id="bronze_top_hole" class="fill-only" d="
                    M 12.00, 5.25 
                    L 12.00, 3.75 
                    A 0.50,0.50 0 0,1 13.00, 3.75 
                    L 13.00, 5.25 
                    Z" fill="#ffffff" />

                <path id="bronze_bottom" d="
                    M 11.50, 13.75 
                    L 11.50, 16.75 
                    A 1.00,1.00 0 0,0 13.50, 16.75 
                    L 13.50, 13.75 
                    Z" />
                <path id="bronze_bottom_hole" class="fill-only" d="
                    M 12.00, 14.75 
                    L 12.00, 16.25 
                    A 0.50,0.50 0 0,0 13.00, 16.25 
                    L 13.00, 14.75 
                    Z" fill="#ffffff" />
            </g>

            <!-- 4. 內部參考線/輔助線 (改回黑色微調) -->
            <line stroke="#333333" stroke-width="0.05" x1="10.50" y1="0.00" x2="10.50" y2="20.00" />
            <line stroke="#ffffff" stroke-width="0.05" x1="0.00" y1="4.00" x2="10.50" y2="4.00" opacity="0.5" />
            <line stroke="#ffffff" stroke-width="0.05" x1="0.00" y1="16.00" x2="10.50" y2="16.00" opacity="0.5" />
        </g>
    </svg>
</body>

</html>
