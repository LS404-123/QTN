<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
    <!-- Stylized Wavy Canopy Outline -->
    <path d="
        M 50, 10
        C 65, 10 75, 25 65, 40
        C 80, 45 90, 65 75, 80
        C 95, 85 95, 115 50, 115
        C 5, 115 5, 85 25, 80
        C 10, 65 20, 45 35, 40
        C 25, 25 35, 10 50, 10
        Z" 
        fill="#48bb78" 
        stroke="#5d4037" 
        stroke-width="3" 
        stroke-linejoin="round" />

    <!-- Internal Trunk and Branches -->
    <line x1="50" y1="115" x2="50" y2="40" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="90" x2="35" y2="70" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="75" x2="65" y2="60" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="60" x2="40" y2="50" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />

    <!-- Ground Base Line -->
    <line x1="30" y1="130" x2="70" y2="130" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="115" x2="50" y2="130" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
</svg>
