<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無縫捲動背景 - 最終優化版</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --accent-color: #D4E7C5;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
        }

        .scroll-box {
            width: 800px;
            height: 450px;
            position: relative;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.1),
                0 5px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
            flex-shrink: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #333;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            margin-left: 30px;
        }

        .overlay h1 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #2c3e50;
        }

        .control-group {
            margin-bottom: 12px;
        }

        .control-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 4px;
            color: #666;
        }

        .control-group input {
            width: 100%;
            cursor: pointer;
        }

        .control-group span {
            float: right;
            font-weight: bold;
            color: #23BF76;
        }
    </style>
</head>

<body>

    <div id="canvas-container">
        <div class="scroll-box" id="container">
            <canvas id="bgCanvas"></canvas>
        </div>
        <div class="overlay">
            <h1>視差控制面板 (16:9)</h1>
            <div class="control-group">
                <label>Hill 2 (遠) <span id="v2">0.4</span></label>
                <input type="range" id="s2" min="0" max="4" step="0.1" value="0.4">
            </div>
            <div class="control-group">
                <label>Hill 1 (近) <span id="v1">0.8</span></label>
                <input type="range" id="s1" min="0" max="6" step="0.1" value="0.8">
            </div>
            <div class="control-group">
                <label>Ground (同步) <span id="vg">2.0</span></label>
                <input type="range" id="sg" min="0" max="10" step="0.1" value="2.0">
            </div>
        </div>
    </div>

    <script src="bg_scroll.js"></script>
    <script>
        // 初始化捲動背景
        const scroller = new BGScroller('container');

        // 設定控制面板
        function setupControls() {
            const mappings = { s2: 'hill2', s1: 'hill1', sg: 'ground' };
            Object.keys(mappings).forEach(id => {
                const slider = document.getElementById(id);
                const display = document.getElementById(id.replace('s', 'v'));

                if (!slider) return;

                slider.addEventListener('input', (e) => {
                    const val = parseFloat(e.target.value);
                    if (display) display.innerText = val.toFixed(1);

                    const type = mappings[id];
                    scroller.updateSpeed(type, val);
                });
            });
        }

        // 等待下一幀確保 scroller 已掛載（或直接呼叫）
        setupControls();
    </script>
</body>

</html>
