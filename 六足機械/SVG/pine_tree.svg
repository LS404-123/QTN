<svg viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
    <!-- Stylized Wavy Pine Canopy (Triangular layers with bumps) -->
    <path d="
        M 50, 10
        C 58, 25 65, 35 55, 45
        C 70, 55 80, 75 60, 80
        C 80, 90 90, 120 50, 120
        C 10, 120 20, 90 40, 80
        C 20, 75 30, 55 45, 45
        C 35, 35 42, 25 50, 10
        Z" 
        fill="#48bb78" 
        stroke="#5d4037" 
        stroke-width="3" 
        stroke-linejoin="round" />

    <!-- Internal Trunk and Pine-style Branches -->
    <line x1="50" y1="120" x2="50" y2="40" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="100" x2="30" y2="95" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="100" x2="70" y2="95" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="80" x2="35" y2="70" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="80" x2="65" y2="70" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="60" x2="40" y2="55" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />
    <line x1="50" y1="60" x2="60" y2="55" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round" />

    <!-- Ground Base Line -->
    <line x1="30" y1="140" x2="70" y2="140" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
    <line x1="50" y1="120" x2="50" y2="140" stroke="#5d4037" stroke-width="3" stroke-linecap="round" />
</svg>
